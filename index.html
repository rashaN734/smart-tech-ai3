<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Tech AI Assistant</title>
  <meta name="description" content="AI-powered hardware diagnostics and network planning tool" />
  <meta name="theme-color" content="#09090f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Smart Tech AI" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- React + Babel (no build tools needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    /* ── Reset & Variables ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #09090f;
      --surface: #111118;
      --surface2: #1a1a25;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.13);
      --text: #e8e8f0;
      --muted: #7070a0;
      --accent: #6c63ff;
      --accent2: #00d4ff;
      --accent3: #ff6b6b;
      --green: #00e5a0;
      --yellow: #ffd166;
      --glow: rgba(108, 99, 255, 0.25);
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    /* ── Dark Mode (default) ────────────────────────── */
      :root, .dark-mode {
        --bg:       #09090f;
        --surface:  #111118;
        --surface2: #1a1a25;
        --border:   rgba(255,255,255,.07);
        --border2:  rgba(255,255,255,.13);
        --text:     #e8e8f0;
        --muted:    #7070a0;
        --accent:   #6c63ff;
        --accent2:  #00d4ff;
        --accent3:  #ff6b6b;
        --green:    #00e5a0;
        --yellow:   #ffd166;
        --glow:     rgba(108,99,255,.25);
        --card-bg:  rgba(255,255,255,.03);
        --input-bg: #1a1a25;
        --shadow:   rgba(0,0,0,.6);
      }

      /* ── Light Mode ──────────────────────────────── */
      .light-mode {
        --bg:       #f2f2fa;
        --surface:  #ffffff;
        --surface2: #eaeaf5;
        --border:   rgba(0,0,0,.09);
        --border2:  rgba(0,0,0,.15);
        --text:     #0c0c1a;
        --muted:    #585890;
        --accent:   #5b52e8;
        --accent2:  #0099bb;
        --accent3:  #dd4444;
        --green:    #009966;
        --yellow:   #cc9900;
        --glow:     rgba(91,82,232,.1);
        --card-bg:  rgba(255,255,255,.95);
        --input-bg: #f5f5fc;
        --shadow:   rgba(0,0,0,.1);
      }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
      min-height: 100%;
    }

    #root, main, .main-content {
      min-height: 100vh;
    }

    button, input, textarea, select {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: .6
      }

      100% {
        transform: scale(1.6);
        opacity: 0
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% center
      }

      100% {
        background-position: 200% center
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateX(-12px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    .animate-fade-up {
      animation: fadeUp .45s ease both;
    }

    .loader {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .shimmer-text {
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 40%, var(--accent) 80%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: border-color .2s, box-shadow .2s;
    }

    .card:hover {
      border-color: var(--border2);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: var(--text);
      box-shadow: 0 0 20px var(--glow);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px var(--glow);
    }

    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    .tag-green {
      background: rgba(0, 229, 160, .12);
      color: var(--green);
      border: 1px solid rgba(0, 229, 160, .25);
    }

    .tag-yellow {
      background: rgba(255, 209, 102, .12);
      color: var(--yellow);
      border: 1px solid rgba(255, 209, 102, .25);
    }

    .tag-red {
      background: rgba(255, 107, 107, .12);
      color: var(--accent3);
      border: 1px solid rgba(255, 107, 107, .25);
    }

    .tag-blue {
      background: rgba(0, 212, 255, .12);
      color: var(--accent2);
      border: 1px solid rgba(0, 212, 255, .25);
    }

    input,
    textarea,
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      resize: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, .15);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
    }

    select option {
      background: var(--surface);
    }

    .chat-bubble-user {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: var(--text);
      border-radius: 14px 14px 4px 14px;
      padding: 10px 14px;
      font-size: 14px;
      max-width: 85%;
      align-self: flex-end;
    }

    .chat-bubble-ai {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 14px 14px 14px 4px;
      padding: 10px 14px;
      font-size: 14px;
      max-width: 92%;
      align-self: flex-start;
    }




    /* ══════════════════════════════════════════════════════
   RESPONSIVE — Mobile First
══════════════════════════════════════════════════════ */

    /* ── Mobile Bottom Nav ─────────────────────────────── */
    /* ── Mobile Bottom Nav ─────────────────────────────── */
    #mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 9, 20, .97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(108,99,255,.18);
      z-index: 200;
      padding: 6px 0 max(6px, env(safe-area-inset-bottom));
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      box-shadow: 0 -4px 24px rgba(108,99,255,.12);
      flex-direction: row;
      align-items: stretch;
      white-space: nowrap;
    }
    #mobile-nav::-webkit-scrollbar { display: none; }

    #mobile-nav .mnav-item {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 6px 12px;
      border: none;
      background: none;
      cursor: pointer;
      min-width: 64px;
      flex-shrink: 0;
      font-family: var(--font-body);
      font-size: 9px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      transition: color .2s, background .2s;
      text-transform: uppercase;
      border-radius: 10px;
      margin: 2px 2px;
      position: relative;
    }

    #mobile-nav .mnav-item:active {
      background: rgba(108,99,255,.12);
    }

    #mobile-nav .mnav-item.active {
      color: var(--accent);
      background: rgba(108,99,255,.1);
    }

    #mobile-nav .mnav-item.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 20%;
      right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(108,99,255,.8);
    }

    #mobile-nav .mnav-item .mnav-icon {
      font-size: 19px;
      line-height: 1;
    }

    /* ── Tablet (768px – 1024px) ───────────────────────── */
    @media (max-width: 1024px) {
      .sidebar {
        width: 180px !important;
      }

      #main,
      .main-wrap {
        margin-left: 180px !important;
      }

      main {
        padding: 20px 20px !important;
      }
    }

    /* ══════════════════════════════════════════════════════
       RESPONSIVE — Tablet & Mobile
    ══════════════════════════════════════════════════════ */

    /* ── Tablet (≤768px) ──────────────────────────────── */
    @media (max-width: 768px) {

      /* Hide sidebar, show mobile bottom nav */
      .sidebar { display: none !important; }

      #main, .main-wrap {
        margin-left: 0 !important;
        width: 100% !important;
      }

      main, .main-content {
        padding: 12px 12px 100px !important;
        max-width: 100% !important;
        overflow-x: hidden !important;
      }

      /* Show mobile nav */
      #mobile-nav { display: flex !important; }

      /* Reduce heavy background effects on mobile */
      #bg-canvas { display: none !important; }
      #bg-orbs { opacity: .5 !important; }
      .bg-orb, .bg-grid { animation: none !important; opacity: .08 !important; }

      /* Header */
      header, .top-bar {
        padding: 0 12px !important;
        height: 52px !important;
      }

      /* Typography scale */
      h1 { font-size: clamp(1.5rem, 6vw, 2rem) !important; }
      h2 { font-size: clamp(1.2rem, 5vw, 1.6rem) !important; }
      h3 { font-size: clamp(1rem, 4vw, 1.3rem) !important; }
      p, li { font-size: clamp(13px, 3.5vw, 15px) !important; }

      /* Grid columns */
      div[style*="grid-template-columns: repeat(4"],
      div[style*="repeat(4,"] { grid-template-columns: repeat(2, 1fr) !important; }

      div[style*="grid-template-columns: repeat(3"],
      div[style*="repeat(3,"] { grid-template-columns: 1fr 1fr !important; }

      div[style*="grid-template-columns: 1fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }

      /* Contact page cards - stack */
      div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }

      /* Flex rows → column on mobile */
      div[style*="display: flex"][style*="gap"][style*="align-items: center"] {
        flex-wrap: wrap !important;
      }

      /* Cards */
      .card { padding: 14px !important; border-radius: 14px !important; }

      /* Buttons */
      .btn { padding: 9px 14px !important; font-size: 12px !important; }

      /* Auth modal */
      #auth-card { margin: 10px !important; border-radius: 18px !important; }

      /* Chat box */
      #chatbox {
        left: 8px !important; right: 8px !important;
        width: auto !important; bottom: 90px !important;
        border-radius: 16px !important;
      }
      #chat-fab { bottom: 80px !important; right: 16px !important; }

      /* Tables - horizontal scroll */
      .table-wrap, table { display: block !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; }
      table { font-size: 11px !important; min-width: 400px; }
      th, td { padding: 7px 8px !important; white-space: nowrap !important; }

      /* Footer responsive */
      footer > div:last-child {
        flex-direction: column !important;
        gap: 12px !important;
        align-items: center !important;
        text-align: center !important;
      }

      /* Hide non-essential desktop header items */
      .header-btns .btn-ghost { display: none !important; }

      /* Modals full-width */
      div[style*="maxWidth: 56"][style*="margin"][style*="auto"] {
        max-width: 100% !important;
        margin: 0 !important;
        border-radius: 16px !important;
      }

      /* Inline code & mono */
      code, pre { font-size: 12px !important; word-break: break-all !important; }

      /* Input / textarea full width */
      input, textarea, select {
        width: 100% !important;
        font-size: 16px !important; /* prevent iOS zoom */
        -webkit-appearance: none !important;
      }
    }

    /* ── Small Mobile (≤480px) ───────────────────────── */
    @media (max-width: 480px) {

      main, .main-content {
        padding: 8px 10px 100px !important;
      }

      h1 { font-size: clamp(1.3rem, 7vw, 1.7rem) !important; }
      h2 { font-size: clamp(1.1rem, 5vw, 1.4rem) !important; }

      /* All multi-col grids → single col */
      div[style*="grid-template-columns: repeat(2"],
      div[style*="grid-template-columns: 1fr 1fr"],
      div[style*="repeat(2,"] { grid-template-columns: 1fr !important; }

      div[style*="grid-template-columns: repeat(3"],
      div[style*="repeat(3,"] { grid-template-columns: 1fr !important; }

      /* Stat cards — 2 per row on small */
      div[style*="repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }

      /* Contact page cards full width */
      div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }

      /* Footer copyright text wraps */
      footer div[style*="textAlign: center"] { font-size: 10px !important; }

      /* Pricing cards */
      .card { padding: 12px !important; }

      /* Nav icon size */
      #mobile-nav .mnav-icon { font-size: 17px !important; }
      #mobile-nav .mnav-item { min-width: 58px !important; font-size: 8px !important; }

      /* Chat FAB position above mobile nav */
      #chat-fab { bottom: 78px !important; right: 12px !important; width: 46px !important; height: 46px !important; }
    }

    /* ── Extra Small (≤360px) ───────────────────────── */
    @media (max-width: 360px) {
      main, .main-content { padding: 6px 8px 96px !important; }
      h1 { font-size: 1.2rem !important; }
      #mobile-nav .mnav-item { min-width: 52px !important; padding: 5px 8px !important; }
    }

    /* ── Global mobile overflow safety ──────────────── */
    @media (max-width: 768px) {
      /* Prevent horizontal scroll from any fixed-width child */
      * { max-width: 100vw; }
      img, video, canvas { max-width: 100% !important; height: auto !important; }

      /* maxWidth containers → full width on mobile */
      div[style*="maxWidth: 900"],
      div[style*="maxWidth: 960"],
      div[style*="maxWidth: 800"],
      div[style*="maxWidth: 700"],
      div[style*="maxWidth: 640"],
      div[style*="maxWidth: 600"] {
        max-width: 100% !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
      }

      /* Flex rows that should wrap */
      div[style*="display: flex"][style*="justifyContent: space-between"] {
        flex-wrap: wrap !important;
        gap: 8px !important;
      }

      /* Inline-flex button groups */
      div[style*="display: flex"][style*="gap: 10"] {
        flex-wrap: wrap !important;
      }

      /* Prevent wide pre/code overflow */
      pre, code {
        white-space: pre-wrap !important;
        word-break: break-word !important;
        overflow-x: auto !important;
      }

      /* Input font-size 16px prevents iOS auto-zoom */
      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="number"],
      textarea,
      select {
        font-size: 16px !important;
      }
    }

    @keyframes neon-shimmer {
      0% {
        background-position:200% center
      }

      100% {
        background-position:-200% center
      }
    }

    @keyframes auth-card-in {
      from {
        opacity:0; transform:translateY(40px) scale(.93)
      }

      to {
        opacity:1; transform:translateY(0) scale(1)
      }
    }

    @keyframes auth-card-out {
      from {
        opacity:1
      }

      to {
        opacity:0; transform:translateY(24px) scale(.94)
      }
    }

    @keyframes pc-btn-glow {
      0%, 100% {
        box-shadow:0 0 20px rgba(245, 158, 11, .5), 0 4px 20px rgba(249, 115, 22, .35)
      }

      50% {
        box-shadow:0 0 36px rgba(245, 158, 11, .8), 0 0 60px rgba(249, 115, 22, .5), 0 4px 24px rgba(236, 72, 153, .4)
      }
    }

    @keyframes pc-btn-shimmer {
      0% {
        background-position:200% 0
      }

      100% {
        background-position:-200% 0
      }
    }

    @keyframes pc-dot1 {
      0%, 100% {
        transform:translate(0, 0) scale(1); opacity:.6
      }

      50% {
        transform:translate(-4px, -4px) scale(1.4); opacity:1
      }
    }

    @keyframes pc-dot2 {
      0%, 100% {
        transform:translate(0, 0) scale(1); opacity:.5
      }

      50% {
        transform:translate(4px, -3px) scale(1.3); opacity:.9
      }
    }

    @keyframes pc-icon-spin {
      0% {
        transform:rotate(0deg) scale(1)
      }

      25% {
        transform:rotate(-8deg) scale(1.1)
      }

      75% {
        transform:rotate(8deg) scale(1.1)
      }

      100% {
        transform:rotate(0deg) scale(1)
      }
    }

    @keyframes hero-fade-in {
      from {
        opacity:0; transform:scale(1.05)
      }

      to {
        opacity:1; transform:scale(1)
      }
    }

    @keyframes grid-scroll {
      0% {
        background-position:0 0
      }

      100% {
        background-position:40px 40px
      }
    }

    @keyframes scan-line {
      0% {
        top:-2px; opacity:0
      }

      5% {
        opacity:1
      }

      95% {
        opacity:1
      }

      100% {
        top:100%; opacity:0
      }
    }

    /* ══ ANIMATED BACKGROUND ══════════════════════════════ */
    @keyframes bg-orb-1 {
      0%, 100% {
        transform:translate(0, 0) scale(1)
      }

      33% {
        transform:translate(60px, -40px) scale(1.15)
      }

      66% {
        transform:translate(-30px, 50px) scale(.88)
      }
    }

    @keyframes bg-orb-2 {
      0%, 100% {
        transform:translate(0, 0) scale(1)
      }

      33% {
        transform:translate(-50px, 35px) scale(.9)
      }

      66% {
        transform:translate(40px, -45px) scale(1.12)
      }
    }

    @keyframes bg-orb-3 {
      0%, 100% {
        transform:translate(0, 0) scale(1)
      }

      50% {
        transform:translate(30px, 30px) scale(1.08)
      }
    }

    @keyframes bg-line {
      0% {
        transform:translateY(-100%); opacity:0
      }

      10% {
        opacity:1
      }

      90% {
        opacity:.4
      }

      100% {
        transform:translateY(100vh); opacity:0
      }
    }

    @keyframes bg-particle {
      0% {
        transform:translate(0, 0) scale(1); opacity:.8
      }

      100% {
        transform:translate(var(--px), var(--py)) scale(0); opacity:0
      }
    }

    @keyframes bg-grid-pulse {
      0%, 100% {
        opacity:.04
      }

      50% {
        opacity:.08
      }
    }

    @keyframes bg-noise {
      0%, 100% {
        transform:translate(0, 0)
      }

      25% {
        transform:translate(-1px, 1px)
      }

      50% {

    // ── API Call ───────────────────────────────────────────
    // ── API Call — Backend Proxy (API key is in server.js only) ──
    async function callClaude(systemPrompt, userPrompt, imageBase64 = null) {
      const token = localStorage.getItem("auth_token") || "";

      // Build messages for Groq (OpenAI-compatible format)
      const messages = [];
      if (systemPrompt) messages.push({ role: "system", content: systemPrompt });

      // Image support (text-only for Groq free tier)
      const userContent = imageBase64
        ? userPrompt + " [Note: image attached - describe based on context]"
        : userPrompt;
      messages.push({ role: "user", content: userContent });

      const res = await fetch("/api/claude", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token,
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          max_tokens: 4000,
          system: systemPrompt,
          messages: [{ role: "user", content: userContent }],
        }),
      });

      const data = await res.json();
      if (data.error) {
        if (data.error.limitReached) {
          window.dispatchEvent(new CustomEvent("smarttech:limitReached", { detail: data.error }));
          const err = new Error("LIMIT_REACHED");
          err.limitReached = true;
          throw err;
        }
        throw new Error(data.error.message || JSON.stringify(data.error));
      }

      // Handle both Groq (choices) and Anthropic (content) response formats
      let text = "";
      if (data.choices?.[0]?.message?.content) {
        text = data.choices[0].message.content;
      } else if (data.content) {
        text = (data.content || []).map(b => b.text || "").join("");
      }
      text = text.trim();
      if (!text) throw new Error("Empty response. Check Groq API key in server.js");
      return text;
    }

    const ADMIN_ACCESS_KEY = "supersecret_admin_key_2026";

    function isAdminLoggedIn() {
      return localStorage.getItem("admin_key") === ADMIN_ACCESS_KEY;
    }

    function extractJSON(raw) {
      const start = raw.indexOf("{");
      const end = raw.lastIndexOf("}");
      if (start === -1 || end === -1) throw new Error("No JSON found in response");
      return JSON.parse(raw.slice(start, end + 1));
    }

      const [ipGenLoading, setIpGenLoading] = useState(false);
      const [copiedKey, setCopiedKey] = useState(null);
      const [showIpSetup, setShowIpSetup] = useState(false);

      // Prefix pools for auto-generation
      const IP_PREFIXES = { home: "192.168.1", "small office": "10.10.1", warehouse: "172.16.1", retail: "192.168.50" };

      function generateIpConfig(envType, deviceCount) {
        const prefix = IP_PREFIXES[envType] || "192.168.1";
        const parts = prefix.split(".");
        const base = parseInt(parts[2]) || 1;
        const gateway = prefix + ".1";
        const dhcpStart = prefix + ".100";
        const dhcpEnd = prefix + "." + Math.min(100 + parseInt(deviceCount || 20) + 10, 254);
        const subnetMask = "255.255.255.0";
        const wildcard = "0.0.0.255";
        const networkAddr = prefix + ".0";
        const broadcast = prefix + ".255";
        const cidr = networkAddr + "/24";
        const usableHosts = 254;
        const reservedIps = [
          { device: "Router / Gateway", ip: prefix + ".1", role: "Default Gateway" },
          { device: "Main Switch", ip: prefix + ".2", role: "Network Switch" },
          { device: "Wireless AP #1", ip: prefix + ".3", role: "Access Point" },
          ...(parseInt(deviceCount) > 10 ? [{ device: "Wireless AP #2", ip: prefix + ".4", role: "Access Point 2" }] : []),
          { device: "Server / NAS", ip: prefix + ".10", role: "File Server (optional)" },
          { device: "Admin PC", ip: prefix + ".20", role: "Network Admin" },
        ];
        return { prefix, gateway, subnetMask, wildcard, networkAddr, broadcast, cidr, dhcpStart, dhcpEnd, usableHosts, reservedIps, dns1: "8.8.8.8", dns2: "8.8.4.4", envType };
      }

      function copyToClipboard(text, key) {
        navigator.clipboard.writeText(text).then(() => { setCopiedKey(key); setTimeout(() => setCopiedKey(null), 1800); });
      }

                    <Row label="Default Gateway" value={cfg.gateway} id="gateway" color="var(--accent2)" />
                    <Row label="Broadcast" value={cfg.broadcast} id="broadcast" color="var(--yellow)" />
                    <Row label="Network Address" value={cfg.networkAddr} id="network" />
                  </div>
                  <div className="card" style={{ padding: "14px 16px" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "var(--accent2)", letterSpacing: ".07em", marginBottom: 10 }}>🔄 DHCP & DNS</div>
                    <Row label="DHCP Start" value={cfg.dhcpStart} id="dhcps" color="var(--accent2)" />
                    <Row label="DHCP End" value={cfg.dhcpEnd} id="dhcpe" color="var(--accent2)" />
                    <Row label="Primary DNS" value={cfg.dns1} id="dns1" color="var(--green)" />
                    <Row label="Secondary DNS" value={cfg.dns2} id="dns2" color="var(--muted)" />
                    <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 10, padding: "8px 10px", background: "rgba(0,229,160,.06)", borderRadius: 8 }}>
                      💡 DHCP range: <strong style={{ color: "var(--green)" }}>{cfg.dhcpStart}</strong> to <strong style={{ color: "var(--green)" }}>{cfg.dhcpEnd}</strong> — devices automatically get IPs
                    </div>
                  </div>
                </div>

                {/* Reserved IPs */}
                <div className="card" style={{ padding: "14px 16px", marginTop: 14 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--yellow)", letterSpacing: ".07em", marginBottom: 10 }}>🔒 RESERVED STATIC IPs (Devices)</div>
                  <div style={{ overflowX: "auto" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                      <thead>
                        <tr style={{ borderBottom: "1px solid var(--border2)" }}>
                          {["Device", "Static IP", "Role", ""].map(h => (
                            <th key={h} style={{ padding: "7px 10px", textAlign: "left", color: "var(--muted)", fontSize: 10, fontFamily: "var(--font-mono)", fontWeight: 500 }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {cfg.reservedIps.map((r, i) => (
                          <tr key={i} style={{ borderBottom: "1px solid var(--border)" }}>
                            <td style={{ padding: "8px 10px", fontWeight: 500 }}>{r.device}</td>
                            <td style={{ padding: "8px 10px", fontFamily: "var(--font-mono)", color: "var(--accent2)", fontWeight: 600 }}>{r.ip}</td>
                            <td style={{ padding: "8px 10px", color: "var(--muted)", fontSize: 11 }}>{r.role}</td>
                            <td style={{ padding: "8px 10px" }}><button onClick={() => copyToClipboard(r.ip, "rip_" + i)} style={{ padding: "3px 8px", border: "1px solid var(--border)", borderRadius: 5, cursor: "pointer", background: copiedKey === "rip_" + i ? "rgba(0,229,160,.15)" : "var(--surface)", color: copiedKey === "rip_" + i ? "var(--green)" : "var(--muted)", fontSize: 10 }}>{copiedKey === "rip_" + i ? "✓" : "copy"}</button></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div style={{ marginTop: 10, padding: "10px 12px", borderRadius: 9, background: "rgba(0,212,255,.06)", border: "1px solid rgba(0,212,255,.15)", fontSize: 12, color: "var(--muted)" }}>
                    📌 Static IPs: Router settings එකේ DHCP Reservation section tap කර, device MAC address සහ ඉහත IP enter කරන්න.
                  </div>
                </div>

                {/* Config Export */}
                <div style={{ marginTop: 14, display: "flex", gap: 10, flexWrap: "wrap" }}>
                  <button onClick={() => {
                    const txt = [
                      "=== NETWORK CONFIGURATION ===",
                      "Network (CIDR): " + cfg.cidr,
                      "Subnet Mask:    " + cfg.subnetMask,
                      "Default Gateway:" + cfg.gateway,
                      "Broadcast:      " + cfg.broadcast,
                      "DHCP Range:     " + cfg.dhcpStart + " - " + cfg.dhcpEnd,
                      "Primary DNS:    " + cfg.dns1,
                      "Secondary DNS:  " + cfg.dns2,
                      "",
                      "=== STATIC IP RESERVATIONS ===",
                      ...cfg.reservedIps.map(r => r.device.padEnd(22) + r.ip + "  (" + r.role + ")"),
                    ].join("\n");
                    copyToClipboard(txt, "export_all");
                  }} className="btn btn-ghost" style={{ fontSize: 12 }}>
                    {copiedKey === "export_all" ? "✓ Copied!" : "📋 Copy All Config"}
                  </button>
                  <button onClick={() => {
                    const blob = new Blob([[
                      "=== NETWORK IP CONFIGURATION ===\n",
                      "Network:        " + cfg.cidr + "\n",
                      "Subnet Mask:    " + cfg.subnetMask + "\n",
                      "Gateway:        " + cfg.gateway + "\n",
                      "DHCP Start:     " + cfg.dhcpStart + "\n",
                      "DHCP End:       " + cfg.dhcpEnd + "\n",
                      "Primary DNS:    " + cfg.dns1 + "\n",
                      "Secondary DNS:  " + cfg.dns2 + "\n\n",
                      "=== STATIC IPs ===\n",
                      ...cfg.reservedIps.map(r => r.device.padEnd(22) + r.ip + "  (" + r.role + ")\n"),
                    ].join("")], { type: "text/plain" });
                    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "network-config.txt"; a.click();
                  }} className="btn btn-ghost" style={{ fontSize: 12 }}>
                    💾 Download Config
                  </button>
                  <button onClick={() => { setIpConfig(null); setShowIpSetup(false); }} className="btn btn-ghost" style={{ fontSize: 12 }}>
                    🔄 Regenerate
                  </button>
                </div>
              </div>
            )}

            {ipMode === "manual" && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(160px,1fr))", gap: 12, marginBottom: 16 }}>
                  {[
                    { key: "network", label: "Network Prefix", ph: "192.168.1", help: "e.g. 192.168.1" },
                    { key: "gateway", label: "Default Gateway", ph: "192.168.1.1", help: "Router IP" },
                    { key: "subnet", label: "Subnet Mask", ph: "255.255.255.0", help: "/24 network" },
                    { key: "dns1", label: "Primary DNS", ph: "8.8.8.8", help: "Google DNS" },
                    { key: "dns2", label: "Secondary DNS", ph: "8.8.4.4", help: "Google DNS 2" },
                    { key: "dhcpStart", label: "DHCP Start", ph: "192.168.1.100", help: "Auto IP start" },
                    { key: "dhcpEnd", label: "DHCP End", ph: "192.168.1.200", help: "Auto IP end" },
                  ].map(f => (
                    <div key={f.key}>
                      <label style={{ fontSize: 10, color: "var(--muted)", fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", display: "block", marginBottom: 5 }}>{f.label}</label>
                      <input value={manualIp[f.key]} onChange={e => setManualIp(m => ({ ...m, [f.key]: e.target.value }))}
                        placeholder={f.ph} style={{ width: "100%", padding: "9px 11px", background: "var(--surface2)", border: "1px solid var(--border2)", borderRadius: 8, color: "var(--text)", fontSize: 12, fontFamily: "var(--font-mono)", outline: "none" }} />
                      <div style={{ fontSize: 9, color: "var(--muted)", marginTop: 3 }}>{f.help}</div>
                    </div>
                  ))}
                </div>
                {/* Preview */}
                <div className="card" style={{ padding: "14px 16px", background: "rgba(0,212,255,.04)", borderColor: "rgba(0,212,255,.2)" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--accent2)", marginBottom: 10 }}>🔍 CONFIGURATION PREVIEW</div>
                  {[
                    ["Network", (manualIp.network || "192.168.1") + ".0/24"],
                    ["Subnet Mask", manualIp.subnet || "255.255.255.0"],
                    ["Default Gateway", manualIp.gateway || (manualIp.network || "192.168.1") + ".1"],
                    ["DHCP Range", (manualIp.dhcpStart || (manualIp.network || "192.168.1") + ".100") + " → " + (manualIp.dhcpEnd || (manualIp.network || "192.168.1") + ".200")],
                    ["DNS Servers", (manualIp.dns1 || "8.8.8.8") + " / " + (manualIp.dns2 || "8.8.4.4")],
                  ].map(([l, v]) => (
                    <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid var(--border)", fontSize: 12 }}>
                      <span style={{ color: "var(--muted)" }}>{l}</span>
                      <span style={{ fontFamily: "var(--font-mono)", color: "var(--accent2)", fontWeight: 600 }}>{v}</span>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: 12, display: "flex", gap: 10 }}>
                  <button onClick={() => {
                    const p = manualIp.network || "192.168.1";
                    const cfg = {
                      gateway: manualIp.gateway || p + ".1", subnetMask: manualIp.subnet || "255.255.255.0",
                      networkAddr: p + ".0", broadcast: p + ".255", cidr: p + ".0/24",
                      dhcpStart: manualIp.dhcpStart || p + ".100", dhcpEnd: manualIp.dhcpEnd || p + ".200",
                      dns1: manualIp.dns1 || "8.8.8.8", dns2: manualIp.dns2 || "8.8.4.4",
                      reservedIps: [
                        { device: "Router / Gateway", ip: manualIp.gateway || p + ".1", role: "Default Gateway" },
                        { device: "Switch", ip: p + ".2", role: "Network Switch" },
                        { device: "Access Point", ip: p + ".3", role: "Wireless AP" },
                      ]
                    };
                    const txt = [
                      "=== MANUAL NETWORK CONFIGURATION ===",
                      "Network:        " + cfg.cidr,
                      "Subnet Mask:    " + cfg.subnetMask,
                      "Gateway:        " + cfg.gateway,
                      "DHCP Range:     " + cfg.dhcpStart + " - " + cfg.dhcpEnd,
                      "Primary DNS:    " + cfg.dns1,
                      "Secondary DNS:  " + cfg.dns2,
                    ].join("\n");
                    copyToClipboard(txt, "manual_export");
                  }} className="btn btn-ghost" style={{ fontSize: 12 }}>
                    {copiedKey === "manual_export" ? "✓ Copied!" : "📋 Copy Config"}
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      const plan = async () => {
        setLoading(true); setResult(null);
        const sys = "You are an expert network engineer in Sri Lanka. Respond ONLY with raw JSON. No markdown. " +
          "ALL prices MUST be in Sri Lankan Rupees (LKR) - use realistic Sri Lanka market prices 2024-2025. " +
          "Fields: topology(string), summary(string), " +
          "nodes:[{id,label,type(Router/AP/Switch/Modem/PC/Server),x(0-580),y(0-260),color}], " +
          "edges:[{from,to,label,style(solid/dashed)}], " +
          "placement:[{device,zone,position,coverage,notes}], " +
          "cabling:{totalLength,runs:[{from,to,length,type}]}, " +
          "bom:[{item,purpose,qty,unitCostLKR,totalLKR}], " +
          "totalCostLKR(number), warnings:[], tips:[]";
        const prompt = "Design network for: " + form.size + "m², " + form.rooms + " rooms, " + form.floors + " floors, " +
          form.speed + "Mbps internet, " + form.devices + " devices, type: " + form.type +
          ". Place nodes with x,y coords for diagram. All costs in LKR.";
        try {
          const raw = await callClaude(sys, prompt);
          const r = extractJSON(raw);
          setResult(r);
          if (r && !r.error) {
            setIpConfig(generateIpConfig(form.type, form.devices));
            setShowIpSetup(true);
          }
        } catch (e) {
          if (e.message !== "AUTH_REQUIRED") setResult({ error: e.message });
        }
        setLoading(false);
      };

      // Node color map
      const nodeColors = {
        Router: "#6c63ff", AP: "#00d4ff", Switch: "#00e5a0",
        Modem: "#ffd166", PC: "#a78bfa", Server: "#f87171"
      };
      const nodeEmoji = {
        Router: "📡", AP: "📶", Switch: "🔀",
        Modem: "🌐", PC: "💻", Server: "🖥️"
      };

      // Build topology SVG from nodes+edges
      const renderTopology = () => {
        if (!result) return null;

        // Use result.nodes if available, else build from accessPoints/placement
        let nodes = result.nodes || [];
        let edges = result.edges || [];

        // Fallback: build nodes from placement/accessPoints
        if (!nodes.length) {
          const pts = result.placement || result.accessPoints || [];
          const cx = 290, cy = 130, r = 95;
          nodes = pts.map((p, i) => {
            const type = p.device || p.id?.split("-")[0] || "AP";
            const angle = i === 0 ? 0 : (i / pts.length) * Math.PI * 2 - Math.PI / 2;
            return {
              id: String(i),
              label: p.device || p.id || "AP",
              type,
              x: i === 0 ? cx : Math.round(cx + Math.cos(angle) * r),
              y: i === 0 ? cy : Math.round(cy + Math.sin(angle) * r),
              color: nodeColors[type] || "#6c63ff"
            };
          });
          // Connect all to first node
          edges = nodes.slice(1).map((n, i) => ({ from: "0", to: String(i + 1), label: "", style: "dashed" }));
        }

        return (
          <svg viewBox="0 0 580 280" style={{ width: "100%", maxHeight: 280 }}>
            <defs>
              <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#6c63ff" stopOpacity="0.06" />
                <stop offset="100%" stopColor="#0a0a14" stopOpacity="0" />
              </radialGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
              <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="rgba(108,99,255,.5)" />
              </marker>
            </defs>
            <rect width="580" height="280" fill="url(#bgGrad)" rx="10" />

            {/* Grid dots */}
            {Array.from({ length: 8 }, (_, row) => Array.from({ length: 12 }, (_, col) => (
              <circle key={`${row}-${col}`} cx={col * 50 + 15} cy={row * 38 + 12} r="1" fill="rgba(255,255,255,.04)" />
            )))}

            {/* Edges */}
            {edges.map((e, i) => {
              const from = nodes.find(n => String(n.id) === String(e.from));
              const to = nodes.find(n => String(n.id) === String(e.to));
              if (!from || !to) return null;
              const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
              return (
                <g key={i}>
                  <line x1={from.x} y1={from.y} x2={to.x} y2={to.y}
                    stroke={e.style === "dashed" ? "rgba(0,212,255,.35)" : "rgba(108,99,255,.5)"}
                    strokeWidth="1.5"
                    strokeDasharray={e.style === "dashed" ? "5,3" : "none"}
                    markerEnd="url(#arrow)" />
                  {e.label && (
                    <text x={mx} y={my - 5} textAnchor="middle" fontSize="8"
                      fill="rgba(255,255,255,.4)" fontFamily="JetBrains Mono,monospace">{e.label}</text>
                  )}
                </g>
              );
            })}

            {/* Nodes */}
            {nodes.map((n, i) => {
              const col = n.color || nodeColors[n.type] || "#6c63ff";
              const sz = n.type === "Router" || n.type === "Modem" ? 22 : 18;
              const emoji = nodeEmoji[n.type] || "📟";
              return (
                <g key={i}>
                  {/* Glow ring */}
                  <circle cx={n.x} cy={n.y} r={sz + 8} fill={`${col}15`} stroke={`${col}30`} strokeWidth="1" />
                  {/* Main circle */}
                  <circle cx={n.x} cy={n.y} r={sz} fill={`${col}25`} stroke={col} strokeWidth="1.8" filter="url(#glow)" />
                  {/* Emoji */}
                  <text x={n.x} y={n.y + 5} textAnchor="middle" fontSize={sz === 22 ? 14 : 11}>{emoji}</text>
                  {/* Label */}
                  <text x={n.x} y={n.y + sz + 12} textAnchor="middle" fontSize="9"
                    fill={col} fontFamily="JetBrains Mono,monospace" fontWeight="600">{n.label || n.type}</text>
                  {/* Zone/position */}
                  {(n.zone || n.position) && (
                    <text x={n.x} y={n.y + sz + 22} textAnchor="middle" fontSize="7.5"
                      fill="rgba(255,255,255,.35)">{(n.zone || n.position || "").substring(0, 14)}</text>
                  )}
                </g>
              );
            })}

            {/* Legend */}
            <text x="10" y="272" fontSize="8" fill="rgba(255,255,255,.25)" fontFamily="JetBrains Mono">
              {result.topology?.toUpperCase()} TOPOLOGY · {nodes.length} NODES
            </text>
          </svg>
        );
      };

      const totalLKR = result?.totalCostLKR ||
        result?.bom?.reduce((s, i) => s + (parseInt(i.totalLKR) || parseInt(i.total) || 0), 0) || 0;

      const inputStyle = { width: "100%", padding: "10px 12px", background: "var(--surface2)", border: "1px solid var(--border2)", borderRadius: 9, color: "var(--text)", fontSize: 13, outline: "none", fontFamily: "var(--font-body)" };

      return (
        <div style={{ animation: "fadeUp 0.4s ease both" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
            <div style={{ width: 40, height: 40, borderRadius: 12, background: "rgba(0,212,255,.12)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="wifi" size={20} color="var(--accent2)" />
            </div>
            <div>
              <h2 style={{ fontFamily: "var(--font-display)", fontSize: "1.4rem", fontWeight: 700 }}>📡 Network Planner <span style={{ color: "var(--accent2)" }}>AI</span></h2>
              <p style={{ color: "var(--muted)", fontSize: 12 }}>Space details enter කරන්න — AI optimal network design + LKR cost estimate දෙනවා</p>
            </div>
          </div>

          <div className="card" style={{ padding: 24, marginBottom: 20 }}>
            <div data-grid="auto" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(170px,1fr))", gap: 14, marginBottom: 18 }}>
              {[
                { key: "size", label: "Building Size (m²)", placeholder: "120" },
                { key: "rooms", label: "Number of Rooms", placeholder: "6" },
                { key: "floors", label: "Number of Floors", placeholder: "2" },
                { key: "speed", label: "Internet Speed (Mbps)", placeholder: "100" },
                { key: "devices", label: "Number of Devices", placeholder: "15" },
              ].map(f => (
                <div key={f.key}>
                  <label style={{ fontSize: 11, color: "var(--muted)", fontWeight: 600, display: "block", marginBottom: 6, letterSpacing: ".05em", textTransform: "uppercase" }}>{f.label}</label>
                  <input type="number" placeholder={f.placeholder} value={form[f.key]} onChange={e => set(f.key, e.target.value)} style={inputStyle} />
                </div>
              ))}
              <div>
                <label style={{ fontSize: 11, color: "var(--muted)", fontWeight: 600, display: "block", marginBottom: 6, letterSpacing: ".05em", textTransform: "uppercase" }}>Environment</label>
                <select value={form.type} onChange={e => set("type", e.target.value)} style={inputStyle}>
                  <option value="home">🏠 Home</option>
                  <option value="small office">🏢 Small Office</option>
                  <option value="warehouse">🏭 Warehouse</option>
                  <option value="retail">🛍️ Retail</option>
                </select>
              </div>
            </div>
            <button className="btn btn-primary" onClick={() => {
              const t = localStorage.getItem("auth_token");
              if (!t) { window.dispatchEvent(new CustomEvent("smarttech:requireAuth")); return; }
              plan();
            }} disabled={loading || !form.size}>
              {loading ? <><span style={{ width: 16, height: 16, border: "2px solid rgba(255,255,255,.2)", borderTopColor: "var(--text)", borderRadius: "50%", display: "inline-block", animation: "spin .7s linear infinite" }} /> Designing...</> : <><Icon name="zap" size={15} /> Generate Network Plan</>}
            </button>
            {/* Quick IP Setup */}
            <button onClick={() => {
              const envType = form.type || "home";
              const devCount = form.devices || "10";
              setIpConfig(generateIpConfig(envType, devCount));
              setShowIpSetup(true);
              setResult(result || {}); // show the section
            }} style={{
              marginTop: 10, padding: "9px 20px", borderRadius: 10, border: "1px dashed rgba(0,212,255,.4)",
              background: "rgba(0,212,255,.05)", color: "var(--accent2)", cursor: "pointer", fontSize: 13,
              fontFamily: "var(--font-body)", display: "inline-flex", alignItems: "center", gap: 8, transition: "all .2s"
            }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent2)"; e.currentTarget.style.background = "rgba(0,212,255,.1)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(0,212,255,.4)"; e.currentTarget.style.background = "rgba(0,212,255,.05)"; }}>
              🌐 IP Address Auto-Generate (Network Plan නැතිව)
            </button>
          </div>

          {result && !result.error && (
            <div style={{ animation: "fadeUp .45s ease both" }}>

              {/* Summary */}
              <div className="card" style={{ padding: 20, marginBottom: 14, background: "linear-gradient(135deg,rgba(0,212,255,.06),rgba(108,99,255,.05))", borderColor: "var(--border2)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                  <div>
                    <span className="tag tag-blue" style={{ marginBottom: 8, display: "inline-block" }}>{(result.topology || "STAR").toUpperCase()} TOPOLOGY</span>
                    <p style={{ fontSize: 13, color: "var(--muted)", maxWidth: 500, marginTop: 6 }}>{result.summary}</p>
                  </div>
                  <div style={{ textAlign: "center", background: "var(--surface2)", borderRadius: 12, padding: "16px 24px", border: "1px solid rgba(0,229,160,.25)" }}>
                    <div style={{ fontFamily: "var(--font-display)", fontSize: "1.8rem", fontWeight: 800, color: "var(--green)" }}>
                      Rs. {totalLKR.toLocaleString()}
                    </div>
                    <div style={{ fontSize: 11, color: "var(--muted)", fontFamily: "var(--font-mono)", marginTop: 3 }}>ESTIMATED COST (LKR)</div>
                  </div>
                </div>
              </div>

              {/* Topology Diagram */}
              <div className="card" style={{ padding: 22, marginBottom: 14 }}>
                <h4 style={{ fontFamily: "var(--font-display)", fontSize: ".95rem", marginBottom: 16, color: "var(--accent2)", display: "flex", alignItems: "center", gap: 8 }}>
                  <Icon name="layers" size={15} color="var(--accent2)" /> Network Topology Diagram
                </h4>
                <div style={{ background: "rgba(0,0,0,.3)", borderRadius: 12, padding: 8, border: "1px solid var(--border)" }}>
                  {renderTopology()}
                </div>
                {/* Legend */}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginTop: 12 }}>
                  {Object.entries(nodeEmoji).map(([type, emoji]) => (
                    <span key={type} style={{ fontSize: 11, color: "var(--muted)", display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ width: 10, height: 10, borderRadius: "50%", background: nodeColors[type], display: "inline-block" }} />
                      {emoji} {type}
                    </span>
                  ))}
                </div>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 14, marginBottom: 14 }}>
                {/* Device Placement */}
                <div className="card" style={{ padding: 20 }}>

    // ── AI Creative Studio ────────────────────────────────

    // ── Image AI Page ──────────────────────────────────────
    function ImageGenPage({ user, onAuthRequired }) {
      const requireAuth = () => { if (!user) { onAuthRequired(); return false; } return true; };

      const [prompt, setPrompt] = useState("");
      const [style, setStyle] = useState("realistic");
      const [ratio, setRatio] = useState("1:1");
      const [count, setCount] = useState(2);
      const [loading, setLoading] = useState(false);
      const [images, setImages] = useState([]);
      const [error, setError] = useState("");
      const [enhanced, setEnhanced] = useState("");

      const styles = [
        { id: "realistic", label: "📷 Realistic", w: 1024, h: 1024 },
        { id: "anime", label: "🎌 Anime", w: 1024, h: 1024 },
        { id: "digital art", label: "🎨 Digital Art", w: 1024, h: 1024 },
        { id: "cyberpunk", label: "🌃 Cyberpunk", w: 1024, h: 1024 },
        { id: "oil painting", label: "🖼️ Oil Painting", w: 1024, h: 1024 },
        { id: "3d render", label: "🧊 3D Render", w: 1024, h: 1024 },
        { id: "watercolor", label: "💧 Watercolor", w: 1024, h: 1024 },
        { id: "sketch", label: "✏️ Sketch", w: 1024, h: 1024 },
      ];

      const ratios = [
        { id: "1:1", label: "1:1 Square", w: 1024, h: 1024 },
        { id: "16:9", label: "16:9 Wide", w: 1280, h: 720 },
        { id: "9:16", label: "9:16 Portrait", w: 720, h: 1280 },
        { id: "4:3", label: "4:3 Classic", w: 1024, h: 768 },
      ];

      const quickPrompts = [
        "A futuristic AI robot in a high-tech laboratory",
        "Neon cyberpunk city at night with rain reflections",
        "Epic RGB gaming PC setup with purple lighting",
        "Beautiful Sri Lanka landscape with mountains and tea",
        "Abstract glowing circuit board with energy flows",
        "Anime warrior with glowing blue sword in battle",
        "Space nebula with colorful stars and galaxies",
        "Underwater fantasy world with bioluminescent creatures",
      ];

      const currentRatio = ratios.find(r => r.id === ratio) || ratios[0];

      const generate = async () => {
        if (!prompt.trim()) { setError("Please enter a prompt!"); return; }
        setLoading(true); setError(""); setImages([]); setEnhanced("");

        try {
          // Step 1: Use direct prompt without enhancement (user requested ONLY image generation via API)
          const enhancedPrompt = style + " style, " + prompt.trim();
          setEnhanced(enhancedPrompt);

          // Step 2: Generate via Backend proxy to use Pollinations API key securely
          const token = localStorage.getItem("auth_token") || "";
          const newImages = [];
          for (let i = 0; i < count; i++) {
            const seed = Math.floor(Math.random() * 99999) + i * 1000;
            const res = await fetch("/api/image", {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
              body: JSON.stringify({ prompt: enhancedPrompt + (count > 1 ? " [Variation " + (i+1) + "]" : ""), width: currentRatio.w, height: currentRatio.h, seed })
            });
            
            if (!res.ok) {
              const errObj = await res.json().catch(() => ({}));
              if (errObj.error && errObj.error.limitReached) {
                window.dispatchEvent(new CustomEvent("smarttech:limitReached", { detail: errObj.error }));
                throw Object.assign(new Error("LIMIT_REACHED"), { limitReached: true });
              }
              throw new Error(errObj.error?.message || "Image generation failed!");
            }
            
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            newImages.push({ url, seed, index: i + 1 });
          }
          setImages(newImages);
        } catch (e) {
          if (!e.limitReached && e.message !== "AUTH_REQUIRED" && e.message !== "LIMIT_REACHED") {
            setError("Generation failed: " + e.message);
          }
        }
        setLoading(false);
      };

      return (
        <div style={{ animation: "fadeUp .4s ease both", maxWidth: 900 }}>

          {/* ── Page Header ─────────────────────────────── */}
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
            <div style={{
              width: 52, height: 52, borderRadius: 16,
              background: "linear-gradient(135deg,#8b5cf6,#ec4899)",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 26, boxShadow: "0 0 28px rgba(139,92,246,.5)", flexShrink: 0
            }}>
              🎨
            </div>
            <div>
              <h1 style={{ fontFamily: "var(--font-display)", fontSize: "clamp(1.5rem,3vw,2rem)", fontWeight: 800, margin: 0 }}>
                Image{" "}
                <span style={{ background: "linear-gradient(135deg,#8b5cf6,#ec4899)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                  AI Generator
                </span>
              </h1>
              <p style={{ color: "var(--muted)", fontSize: 13, margin: 0, marginTop: 4 }}>
                ✨ Rendered beautifully via Pollinations API
              </p>
            </div>
          </div>

          {/* ── Settings Card ───────────────────────────── */}
          <div className="card" style={{ padding: 26, marginBottom: 20 }}>

            {/* Art Style */}
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 11, color: "var(--muted)", fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase", display: "block", marginBottom: 10 }}>
                Art Style
              </label>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8 }}>
                {styles.map(s => (
                  <button key={s.id} onClick={() => setStyle(s.id)}
                    style={{
                      padding: "9px 6px", borderRadius: 10, cursor: "pointer", fontSize: 12,
                      fontWeight: style === s.id ? 700 : 400, transition: "all .15s", textAlign: "center",
                      border: "1px solid " + (style === s.id ? "#8b5cf6" : "var(--border)"),
                      background: style === s.id ? "rgba(139,92,246,.15)" : "var(--surface2)",
                      color: style === s.id ? "#a78bfa" : "var(--muted)",
                      boxShadow: style === s.id ? "0 0 12px rgba(139,92,246,.3)" : "none"
                    }}>
                    {s.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Ratio + Count */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
              <div>
                <label style={{ fontSize: 11, color: "var(--muted)", fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase", display: "block", marginBottom: 10 }}>
                  Aspect Ratio
                </label>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {ratios.map(r => (
                    <button key={r.id} onClick={() => setRatio(r.id)}
                      style={{
                        padding: "7px 12px", borderRadius: 9, cursor: "pointer", fontSize: 12,
                        fontWeight: ratio === r.id ? 700 : 400, transition: "all .15s",
                        border: "1px solid " + (ratio === r.id ? "#8b5cf6" : "var(--border)"),
                        background: ratio === r.id ? "rgba(139,92,246,.15)" : "var(--surface2)",
                        color: ratio === r.id ? "#a78bfa" : "var(--muted)"
                      }}>
                      {r.label}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label style={{ fontSize: 11, color: "var(--muted)", fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase", display: "block", marginBottom: 10 }}>
                  Number of Images
                </label>
                <div style={{ display: "flex", gap: 8 }}>
                  {[1, 2, 4].map(n => (
                    <button key={n} onClick={() => setCount(n)}
                      style={{
                        width: 44, height: 36, borderRadius: 9, cursor: "pointer",
                        fontWeight: 700, fontSize: 14, transition: "all .15s",
                        border: "1px solid " + (count === n ? "#8b5cf6" : "var(--border)"),
                        background: count === n ? "rgba(139,92,246,.15)" : "var(--surface2)",
                        color: count === n ? "#a78bfa" : "var(--muted)"
                      }}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Quick Prompts */}
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 11, color: "var(--muted)", fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase", display: "block", marginBottom: 8 }}>
                Quick Prompts
              </label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {quickPrompts.map(p => (
                  <button key={p} onClick={() => setPrompt(p)}
                    style={{
                      padding: "5px 12px", borderRadius: 20, cursor: "pointer", fontSize: 12,
                      border: "1px solid var(--border)", background: "var(--surface2)",
                      color: "var(--muted)", transition: "all .15s"
                    }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = "#8b5cf6"; e.currentTarget.style.color = "#a78bfa"; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.color = "var(--muted)"; }}>
                    {p.length > 30 ? p.slice(0, 30) + "..." : p}
                  </button>
                ))}
              </div>
            </div>

            {/* Prompt Input */}
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 11, color: "var(--muted)", fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase", display: "block", marginBottom: 8 }}>
                Your Prompt
              </label>
              <textarea
                value={prompt}
                onChange={e => setPrompt(e.target.value)}
                onKeyDown={e => e.key === "Enter" && e.ctrlKey && generate()}
                placeholder="Describe what you want to see... (e.g. A futuristic city at sunset)"
                rows={3}
                style={{
                  width: "100%", padding: "12px 14px", background: "var(--surface2)",
                  border: "1px solid var(--border2)", borderRadius: 11, color: "var(--text)",
                  fontSize: 14, fontFamily: "var(--font-body)", outline: "none", resize: "vertical",
                  boxSizing: "border-box"
                }}
              />
              <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 4 }}>
                💡 Ctrl+Enter to generate · {prompt.length}/500 chars
              </div>
            </div>

            {/* Generate Button */}
            <button onClick={generate} disabled={loading || !prompt.trim()}
              style={{
                padding: "13px 32px", borderRadius: 12, border: "none",
                cursor: loading || !prompt.trim() ? "not-allowed" : "pointer",
                background: "linear-gradient(135deg,#8b5cf6,#ec4899)",
                color: "var(--text)", fontWeight: 800, fontSize: 15,
                fontFamily: "var(--font-body)",
                boxShadow: "0 0 24px rgba(139,92,246,.45)",
                opacity: loading || !prompt.trim() ? 0.6 : 1,
                display: "flex", alignItems: "center", gap: 12, transition: "all .25s"
              }}
              onMouseEnter={e => { if (!loading && prompt.trim()) { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 0 40px rgba(139,92,246,.65)"; } }}
              onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = "0 0 24px rgba(139,92,246,.45)"; }}>
              {loading ? (
                <>
                  <span style={{ width: 18, height: 18, border: "2.5px solid rgba(255,255,255,.3)", borderTopColor: "var(--text)", borderRadius: "50%", display: "inline-block", animation: "spin .7s linear infinite" }} />
                  Generating {count} image{count > 1 ? "s" : ""}...
                </>
              ) : (
                <>🎨 Generate {count} Image{count > 1 ? "s" : ""}</>
              )}
            </button>

            {error && (
              <div style={{
                marginTop: 14, padding: "12px 16px", borderRadius: 10,
                background: "rgba(255,107,107,.08)", border: "1px solid rgba(255,107,107,.25)",
                color: "var(--accent3)", fontSize: 13
              }}>
                {error}
              </div>
            )}
          </div>

          {/* ── Enhanced Prompt Display ──────────────────── */}
          {enhanced && (
            <div className="card" style={{
              padding: 18, marginBottom: 20,
              borderColor: "rgba(139,92,246,.25)", background: "rgba(139,92,246,.05)"
            }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#a78bfa", letterSpacing: ".07em", marginBottom: 8 }}>
                ✨ FINAL PROMPT SENT TO API
              </div>
              <p style={{ fontSize: 13, color: "rgba(255,255,255,.7)", lineHeight: 1.7, margin: 0 }}>
                {enhanced}
              </p>
            </div>
          )}

          {/* ── Generated Images ─────────────────────────── */}
          {images.length > 0 && (
            <div style={{ animation: "fadeUp .4s ease both" }}>
              <div style={{ fontSize: 11, color: "var(--muted)", fontFamily: "var(--font-mono)", marginBottom: 14, letterSpacing: ".06em" }}>
                GENERATED IMAGES · {style.toUpperCase()} · {currentRatio.label}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: images.length === 1 ? "1fr" : "repeat(2,1fr)", gap: 16 }}>
                {images.map((img, i) => (
                  <div key={i} className="card" style={{
                    padding: 0, overflow: "hidden",
                    borderColor: "rgba(139,92,246,.2)", position: "relative"
                  }}>
                    {/* Loading placeholder */}
                    <div style={{
                      width: "100%", minHeight: 240, background: "linear-gradient(135deg,rgba(139,92,246,.08),rgba(236,72,153,.05))",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      position: "relative"
                    }}>
                      <img
                        src={img.url}
                        alt={"AI Image " + img.index}
                        loading="lazy"
                        style={{ width: "100%", display: "block", borderRadius: "inherit" }}
                        onLoad={e => { e.target.previousSibling && (e.target.previousSibling.style.display = "none"); }}
                        onError={e => { e.target.src = ""; e.target.alt = "Image loading... (may take 10-30s)"; }}
                      />
                    </div>
                    {/* Action bar */}
                    <div style={{
                      padding: "12px 14px", borderTop: "1px solid rgba(139,92,246,.15)",
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                      background: "rgba(139,92,246,.04)"
                    }}>
                      <div style={{ fontSize: 11, color: "var(--muted)", fontFamily: "var(--font-mono)" }}>
                        Image {img.index} · Seed {img.seed}

                      <div style={{ display: "flex", gap: 8 }}>
                        <a href={img.url} target="_blank" rel="noreferrer"
                          style={{
                            padding: "5px 12px", borderRadius: 8,
                            background: "rgba(139,92,246,.2)", border: "1px solid rgba(139,92,246,.4)",
                            color: "#a78bfa", fontSize: 11, fontWeight: 700, textDecoration: "none",
                            transition: "all .15s"
                          }}
                          onMouseEnter={e => e.currentTarget.style.background = "rgba(139,92,246,.4)"}
                          onMouseLeave={e => e.currentTarget.style.background = "rgba(139,92,246,.2)"}>
                          🔍 Full Size
                        </a>
                        <a href={img.url} download={"smarttech-ai-" + img.index + ".jpg"} target="_blank" rel="noreferrer"
                          style={{
                            padding: "5px 12px", borderRadius: 8,
                            background: "rgba(255,255,255,.08)", border: "1px solid rgba(255,255,255,.15)",
                            color: "var(--text)", fontSize: 11, fontWeight: 700, textDecoration: "none",
                            transition: "all .15s"
                          }}
                          onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,.15)"}
                          onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,.08)"}>
                          ⬇️ Download
                        </a>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Regenerate */}
              <div style={{ textAlign: "center", marginTop: 16 }}>

        const load = () => {
          const v = window.speechSynthesis?.getVoices() || [];
          setVoices(v);
          const def = v.find(x => x.lang.startsWith("en")) || v[0];
          if (def && !selVoice) setSelVoice(def.name);
        };
        load();
        window.speechSynthesis?.addEventListener("voiceschanged", load);
        return () => window.speechSynthesis?.removeEventListener("voiceschanged", load);
      }, []);

      const generate = async () => {
        if (!requireAuth()) return;
        if (!voiceText.trim()) return;
        setVoiceLoad(true); setEnhanced("");

            "You are a professional voice script writer. Make the given text natural, clear and engaging for text-to-speech. Fix grammar and add natural rhythm. Return ONLY the improved text.",
            voiceText
          );
          setEnhanced(script.trim());
          window.speechSynthesis?.cancel();
          const utt = new SpeechSynthesisUtterance(script.trim());
          utt.rate = parseFloat(voiceRate);
          utt.pitch = parseFloat(voicePitch);
          const found = voices.find(x => x.name === selVoice);
          if (found) utt.voice = found;
          utt.onstart = () => setSpeaking(true);
          utt.onend = () => { setSpeaking(false); setVoiceLoad(false); };
          utt.onerror = () => { setSpeaking(false); setVoiceLoad(false); };
          window.speechSynthesis.speak(utt);

          utt.onend = () => { setSpeaking(false); setVoiceLoad(false); };
          utt.onerror = () => { setSpeaking(false); setVoiceLoad(false); };
          window.speechSynthesis.speak(utt);

    }

                              <p style={{ fontSize: 12, color: "var(--muted)", lineHeight: 1.7, margin: "0 0 8px" }}>{s.action}</p>
                              {s.tip && (
                                <div style={{ padding: "7px 10px", borderRadius: 7, background: "rgba(0,212,255,.08)", border: "1px solid rgba(0,212,255,.2)", fontSize: 11, color: "var(--accent2)", marginBottom: 6 }}>
                                  💡 {s.tip}

                                  ⚠️ {s.warning}
                                </div>
                              )}
                              <button onClick={e => { e.stopPropagation(); navigator.clipboard.writeText(s.action).then(() => setCopiedStep("s" + i)); setTimeout(() => setCopiedStep(null), 1800); }}
                                style={{ marginTop: 8, padding: "3px 10px", borderRadius: 6, border: "1px solid var(--border)", cursor: "pointer", background: copiedStep === "s" + i ? "rgba(0,229,160,.1)" : "transparent", color: copiedStep === "s" + i ? "var(--green)" : "var(--muted)", fontSize: 10 }}>
                                {copiedStep === "s" + i ? "✓ Copied" : "📋 Copy step"}
                              </button>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Tools Needed */}
                  {solution.tools?.length > 0 && (
                    <div className="card" style={{ padding: "14px 16px", borderColor: "rgba(0,229,160,.2)" }}>

                  {/* When to Seek Help */}

                      <div style={{ fontSize: 11, fontWeight: 700, color: "var(--accent3)", letterSpacing: ".07em", marginBottom: 6 }}>🆘 PROFESSIONAL HELP ලබා ගන්නේ කවදාද?</div>

          </div>

          {/* Quick Stats Bar */}
          <div style={{ marginTop: 24, display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))", gap: 10 }}>

          const data = await res.json();

          // Build PayHere form and submit
          const form = document.createElement("form");

            input.name = key;
            input.value = value;

      const [page, setPage] = useState("home");

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth <= 768);
        window.addEventListener("resize", handleResize);
        window.addEventListener("orientationchange", () => setTimeout(handleResize, 100));
        return () => window.removeEventListener("resize", handleResize);
      }, []);
      const [dark, setDark] = useState(() => {
        try { const s = localStorage.getItem("st_theme"); return s ? s === "dark" : true; } catch { return true; }
      });
      const [chatOpen, setChatOpen] = useState(false);
      const [user, setUser] = useState(null);
      const [authModal, setAuthModal] = useState(false);
      const [limitModal, setLimitModal] = useState(false);
      const [userPlan, setUserPlan] = useState({ plan: "free", used: 0, limit: 10, remaining: 10 });

      // Sync dark/light mode to body + localStorage
      useEffect(() => {
        document.body.classList.toggle("dark-mode",  dark);
        document.body.classList.toggle("light-mode", !dark);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        try { localStorage.setItem("st_theme", dark ? "dark" : "light"); } catch {}
      }, [dark]);

      // Fetch usage stats when user or page changes
      useEffect(() => {
        if (!user) return;
        const token = localStorage.getItem("auth_token");
        fetch("/auth/stats", { headers: { "Authorization": "Bearer " + token } })
          .then(r => r.json()).then(d => { if (d.plan) setUserPlan(d); })
          .catch(() => { });
      }, [user, page]);

      // Handle payment success/cancel in URL
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get("payment") === "success") {
          const plan = params.get("plan");
          alert("✅ Payment successful! Plan upgraded to " + plan + ".");
          window.history.replaceState({}, "", "/");
          // Refresh user stats
          setTimeout(() => { const t = localStorage.getItem("auth_token"); if (t) fetch("/auth/verify", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: t }) }).then(r => r.json()).then(d => { if (d.valid) setUser(d.user); }); }, 1000);
        }
      }, []);

      // Listen for auth required events from tools
      useEffect(() => {
        const handler = () => setAuthModal(true);
        window.addEventListener("smarttech:requireAuth", handler);
        return () => window.removeEventListener("smarttech:requireAuth", handler);
      }, []);

      useEffect(() => {
        const handler = () => setLimitModal(true);
        window.addEventListener("smarttech:limitReached", handler);
        return () => window.removeEventListener("smarttech:limitReached", handler);
      }, []);

      // Mobile navigation listener
      useEffect(() => {
        const handler = (e) => {
          const pg = e.detail?.page;
          if (!pg) return;
          if ((pg === "hardware" || pg === "network" || pg === "pcbuild") && !user) {
            setAuthModal(true); return;
          }
          setPage(pg);
        };
        window.addEventListener("smarttech:navigate", handler);
        return () => window.removeEventListener("smarttech:navigate", handler);
      }, [user]);

      // Sync mobile nav active state when page changes
      useEffect(() => {
        document.querySelectorAll(".mnav-item").forEach(b => b.classList.remove("active"));
        const active = document.getElementById("mnav-" + page);
        if (active) active.classList.add("active");
      }, [page]);

      // Silently restore session on load
      useEffect(() => {
        const token = localStorage.getItem("auth_token");
        const saved = localStorage.getItem("auth_user");
        if (token && saved) {
          fetch("/auth/verify", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token }) })
            .then(r => r.json()).then(d => { if (d.valid) setUser(d.user); else { localStorage.removeItem("auth_token"); localStorage.removeItem("auth_user"); } })
            .catch(() => { try { setUser(JSON.parse(saved)); } catch { } });
        }
      }, []);

      const requireAuth = (callback) => {
        if (user) { callback(); return; }
        setAuthModal(true);
        window._pendingAction = callback;
