    // ── Full Canvas Particle + Neon Background ────────────
  </script>
  <script>
    // ── Canvas Background Animation ──────────────────────
    (function initBG() {
      const canvas = document.getElementById("bg-canvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");

      let W, H, particles, lines, meteors, rings;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      // ── Particle class ──────────────────────────────────
      function Particle() {
        this.reset = function () {
          this.x = Math.random() * W;
          this.y = Math.random() * H;
          this.vx = (Math.random() - 0.5) * 0.4;
          this.vy = (Math.random() - 0.5) * 0.4;
          this.r = Math.random() * 1.8 + 0.4;
          this.alpha = Math.random() * 0.6 + 0.2;
          const colors = ["#6c63ff", "#06b6d4", "#8b5cf6", "#00e5a0", "#a78bfa", "#67e8f9"];
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.pulse = Math.random() * Math.PI * 2;
          this.pulseSpeed = 0.02 + Math.random() * 0.02;
        };
        this.reset();
        this.y = Math.random() * H; // spread initial y

        this.update = function () {
          this.x += this.vx;
          this.y += this.vy;
          this.pulse += this.pulseSpeed;
          if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
        };

        this.draw = function () {
          const a = this.alpha * (0.6 + 0.4 * Math.sin(this.pulse));
          ctx.save();
          ctx.globalAlpha = a;
          ctx.shadowColor = this.color;
          ctx.shadowBlur = 8;
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        };
      }

      // ── Meteor / shooting star ──────────────────────────
      function Meteor() {
        this.reset = function () {
          this.x = Math.random() * W * 1.5 - W * 0.25;
          this.y = -20;
          this.len = 80 + Math.random() * 120;
          this.speed = 6 + Math.random() * 8;
          this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
          this.alpha = 0;
          this.life = 0;
          this.maxLife = 60 + Math.random() * 40;
          const cols = ["#6c63ff", "#06b6d4", "#a78bfa", "#ffffff"];
          this.color = cols[Math.floor(Math.random() * cols.length)];
          this.active = false;
        };
        this.reset();

        this.spawn = function () {
          this.reset();
          this.active = true;
        };

        this.update = function () {
          if (!this.active) return;
          this.life++;
          this.x += Math.cos(this.angle) * this.speed;
          this.y += Math.sin(this.angle) * this.speed;
          if (this.life < 10) this.alpha = this.life / 10;
          else if (this.life > this.maxLife - 15) this.alpha = Math.max(0, (this.maxLife - this.life) / 15);
          else this.alpha = 1;
          if (this.life >= this.maxLife) { this.active = false; }
        };

        this.draw = function () {
          if (!this.active || this.alpha <= 0) return;
          const tx = this.x - Math.cos(this.angle) * this.len;
          const ty = this.y - Math.sin(this.angle) * this.len;
          const grad = ctx.createLinearGradient(tx, ty, this.x, this.y);
          grad.addColorStop(0, "transparent");
          grad.addColorStop(0.7, this.color + "88");
          grad.addColorStop(1, this.color);
          ctx.save();
          ctx.globalAlpha = this.alpha * 0.85;
          ctx.strokeStyle = grad;
          ctx.lineWidth = 1.5;
          ctx.shadowColor = this.color;
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.moveTo(tx, ty);
          ctx.lineTo(this.x, this.y);
          ctx.stroke();
          // Bright tip
          ctx.globalAlpha = this.alpha;
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        };
      }

      // ── Neon ring pulse ─────────────────────────────────
      function Ring() {
        this.reset = function () {
          this.x = Math.random() * W;
          this.y = Math.random() * H;
          this.r = 0;
          this.maxR = 80 + Math.random() * 120;
          this.speed = 0.8 + Math.random() * 0.8;
          this.alpha = 0.6;
          const cols = ["#6c63ff", "#06b6d4", "#8b5cf6", "#00e5a0"];
          this.color = cols[Math.floor(Math.random() * cols.length)];
          this.active = true;
        };
        this.reset();
        this.r = Math.random() * this.maxR; // stagger

        this.update = function () {
          this.r += this.speed;
          this.alpha = 0.5 * (1 - this.r / this.maxR);
          if (this.r >= this.maxR) this.reset();
        };

        this.draw = function () {
          if (this.alpha <= 0) return;
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 1;
          ctx.shadowColor = this.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        };
      }

      // ── Init objects ─────────────────────────────────────
      particles = Array.from({ length: 120 }, () => new Particle());
      meteors = Array.from({ length: 5 }, () => new Meteor());
      rings = Array.from({ length: 6 }, () => new Ring());

      // Spawn meteors periodically
      let meteorTimer = 0;
      function spawnMeteor() {
        const m = meteors.find(m => !m.active);
        if (m) m.spawn();
      }

      // ── Connection lines between nearby particles ────────
      function drawConnections() {
        const maxDist = 110;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < maxDist) {
              const alpha = (1 - dist / maxDist) * 0.18;
              ctx.save();
              ctx.globalAlpha = alpha;
              ctx.strokeStyle = particles[i].color;
              ctx.lineWidth = 0.5;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
              ctx.restore();
            }
          }
        }
      }

      // ── Main loop ─────────────────────────────────────────
      function loop() {
        ctx.clearRect(0, 0, W, H);

        // Rings
        rings.forEach(r => { r.update(); r.draw(); });

        // Connections
        drawConnections();

        // Particles
        particles.forEach(p => { p.update(); p.draw(); });

        // Meteors
        meteorTimer++;
        if (meteorTimer % 90 === 0) spawnMeteor();
        meteors.forEach(m => { m.update(); m.draw(); });

        requestAnimationFrame(loop);
      }
      loop();
    })();
  </script>

<script>
/* ═══════════════════════════════════════════════════════
   SMART TECH AI — Advanced Animation Engine
═══════════════════════════════════════════════════════ */

(function() {

  /* ── 1. Page Load Splash ──────────────────────────────
     Animated intro overlay that sweeps away on load       */
  function createSplash() {
    const splash = document.createElement('div');
    splash.id = 'st-splash';
    splash.innerHTML = `
      <div class="splash-bg"></div>
      <div class="splash-content">
        <div class="splash-logo">
          <div class="splash-icon">⚡</div>
          <div class="splash-brand">Smart Tech<span>AI</span></div>
        </div>
        <div class="splash-bar"><div class="splash-fill"></div></div>
        <div class="splash-tagline">Initializing AI Systems...</div>
      </div>
    `;
    const style = document.createElement('style');
    style.textContent = `
      #st-splash {
        position:fixed; inset:0; z-index:99999;
        display:flex; align-items:center; justify-content:center;
        background:linear-gradient(135deg,#05010f 0%,#0a0520 50%,#010814 100%);
        transition: opacity .6s ease, transform .6s ease;
      }
      #st-splash.hide {
        opacity:0; pointer-events:none;
        transform: scale(1.04);
      }
      .splash-bg {
        position:absolute; inset:0; overflow:hidden;
      }
      .splash-bg::before {
        content:'';
        position:absolute;
        top:50%; left:50%;
        width:600px; height:600px;
        margin:-300px 0 0 -300px;
        background:radial-gradient(circle,rgba(108,99,255,.2) 0%,transparent 70%);
        animation:splash-pulse 2s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%,100%{transform:scale(.8);opacity:.6;}
        50%{transform:scale(1.2);opacity:1;}
      }
      .splash-content {
        text-align:center;
        animation:splash-in .5s cubic-bezier(.16,1,.3,1) both;
      }
      @keyframes splash-in {
        from{opacity:0;transform:translateY(24px) scale(.9);}
        to{opacity:1;transform:translateY(0) scale(1);}
      }
      .splash-icon {
        font-size:56px;
        margin-bottom:16px;
        display:inline-block;
        animation:splash-bounce 1s cubic-bezier(.34,1.56,.64,1) .2s both;
      }
      @keyframes splash-bounce {
        from{transform:scale(0) rotate(-20deg);opacity:0;}
        to{transform:scale(1) rotate(0deg);opacity:1;}
      }
      .splash-brand {
        font-family:'Rajdhani','Orbitron',sans-serif;
        font-size:2.4rem; font-weight:800;
        color:#fff; letter-spacing:.1em;
        text-transform:uppercase;
        animation:splash-in .5s ease .15s both;
      }
      .splash-brand span {
        background:linear-gradient(135deg,#6c63ff,#06b6d4);
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        margin-left:8px;
      }
      .splash-bar {
        width:240px; height:3px;
        background:rgba(255,255,255,.08);
        border-radius:2px;
        margin:24px auto 12px;
        overflow:hidden;
      }
      .splash-fill {
        height:100%;
        background:linear-gradient(90deg,#6c63ff,#06b6d4,#a855f7);
        border-radius:2px;
        width:0;
        transition:width .05s linear;
        box-shadow:0 0 12px rgba(108,99,255,.8);
      }
      .splash-tagline {
        font-size:12px; color:rgba(255,255,255,.35);
        letter-spacing:.15em; text-transform:uppercase;
        font-family:monospace;
        animation:splash-in .5s ease .3s both;
      }
    `;
    document.head.appendChild(style);
    document.body.appendChild(splash);
    return splash;
  }

  function runSplash() {
    const splash = createSplash();
    const fill   = splash.querySelector('.splash-fill');
    const taglines = [
      'Initializing AI Systems...',
      'Loading Neural Networks...',
      'Connecting to Groq API...',
      'Ready!'
    ];
    let progress = 0;
    let tagIdx   = 0;
    const tagEl  = splash.querySelector('.splash-tagline');

    const timer = setInterval(() => {
      progress += Math.random() * 18 + 8;
      if (progress > 100) progress = 100;
      fill.style.width = progress + '%';

      if (progress > 25 && tagIdx === 0) { tagEl.textContent = taglines[1]; tagIdx = 1; }
      if (progress > 60 && tagIdx === 1) { tagEl.textContent = taglines[2]; tagIdx = 2; }
      if (progress >= 100) {
        tagEl.textContent = taglines[3];
        clearInterval(timer);
        setTimeout(() => {
          splash.classList.add('hide');
          setTimeout(() => splash.remove(), 700);
        }, 400);
      }
    }, 80);
  }

  /* ── 2. Ripple Effect on Buttons ──────────────────────*/
  function addRippleToButtons() {
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('button, .btn');
      if (!btn) return;
      const rect   = btn.getBoundingClientRect();
      const size   = Math.max(rect.width, rect.height) * 2;
      const ripple = document.createElement('span');
      ripple.className = 'ripple-effect';
      ripple.style.cssText = `
        width:${size}px; height:${size}px;
        left:${e.clientX - rect.left - size/2}px;
        top:${e.clientY - rect.top - size/2}px;
      `;
      const prev = btn.querySelector('.ripple-effect');
      if (prev) prev.remove();
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);
    });
  }

  /* ── 3. Scroll-Triggered Reveal ───────────────────────*/
  function initScrollReveal() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => {
            entry.target.classList.add('visible');
          }, i * 60);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

    const observe = () => {
      document.querySelectorAll('.card:not(.visible)').forEach(el => {
        if (!el.classList.contains('reveal')) {
          el.classList.add('reveal');
        }
        observer.observe(el);
      });
    };

    observe();
    // Re-observe when React updates DOM
    const mo = new MutationObserver(observe);
    const root = document.getElementById('root');
    if (root) mo.observe(root, { childList: true, subtree: true });
  }

  /* ── 4. Animated Number Counters ─────────────────────*/
  function animateCounters() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const el  = entry.target;
        const raw = el.textContent.trim();
        // Match numbers like 2847, 98.2, 1.4
        const match = raw.match(/^([+]?)([\d,]+\.?\d*)(.*)$/);
        if (!match) return;
        const prefix = match[1] || '';
        const target = parseFloat(match[2].replace(',',''));
        const suffix = match[3] || '';
        const isFloat = match[2].includes('.');
        const decimals = isFloat ? (match[2].split('.')[1]?.length || 1) : 0;
        let start = 0;
        const duration = 1200;
        const startTime = performance.now();
        const tick = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = target * eased;
          if (isFloat) {
            el.textContent = prefix + current.toFixed(decimals) + suffix;
          } else {
            el.textContent = prefix + Math.floor(current).toLocaleString() + suffix;
          }
          if (progress < 1) requestAnimationFrame(tick);
          else el.textContent = prefix + (isFloat ? target.toFixed(decimals) : target.toLocaleString()) + suffix;
        };
        requestAnimationFrame(tick);
        observer.unobserve(el);
      });
    }, { threshold: 0.5 });

    const observeNumbers = () => {
      document.querySelectorAll('[data-counter]').forEach(el => observer.observe(el));
    };
    observeNumbers();
    const mo = new MutationObserver(observeNumbers);
    const root = document.getElementById('root');
    if (root) mo.observe(root, { childList: true, subtree: true });
  }

  /* ── 5. Floating Particles on Hero ───────────────────*/
  function addHeroParticles() {
    const addParticles = () => {
      document.querySelectorAll('[data-particles]').forEach(hero => {
        if (hero.querySelector('.particle')) return;
        for (let i = 0; i < 12; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.cssText = `
            left:${Math.random()*100}%;
            bottom:${Math.random()*30}%;
            --dur:${2.5+Math.random()*3}s;
            --delay:${Math.random()*4}s;
            --dx:${(Math.random()-0.5)*60}px;
            width:${2+Math.random()*3}px;
            height:${2+Math.random()*3}px;
            background:${['rgba(108,99,255,.7)','rgba(0,212,255,.6)','rgba(168,85,247,.6)'][Math.floor(Math.random()*3)]};
          `;
          hero.appendChild(p);
        }
      });
    };
    addParticles();
    const mo = new MutationObserver(addParticles);
    const root = document.getElementById('root');
    if (root) mo.observe(root, { childList: true, subtree: true });
  }

  /* ── 6. Cursor Glow Effect ────────────────────────────*/
  function initCursorGlow() {
    if (window.matchMedia('(pointer:coarse)').matches) return; // skip mobile
    const glow = document.createElement('div');
    glow.style.cssText = `
      position:fixed; width:300px; height:300px;
      border-radius:50%; pointer-events:none; z-index:1;
      background:radial-gradient(circle,rgba(108,99,255,.06) 0%,transparent 70%);
      transform:translate(-50%,-50%);
      transition:left .15s ease,top .15s ease;
      will-change:left,top;
    `;
    document.body.appendChild(glow);
    document.addEventListener('mousemove', e => {
      requestAnimationFrame(() => {
        glow.style.left = e.clientX + 'px';
        glow.style.top  = e.clientY + 'px';
      });
    });
  }

  /* ── 7. Sidebar Logo Glow on Load ────────────────────*/
  function animateLogo() {
    const logo = document.querySelector('aside > div:first-child span, aside .brand');
    if (logo) {
      logo.style.animation = 'neonFlicker 3s ease 1s forwards';
    }
  }

  /* ── 8. Page Transition ───────────────────────────────*/
  function initPageTransitions() {
    const root = document.getElementById('root');
    if (!root) return;
    let lastPage = '';
    const mo = new MutationObserver(() => {
      const main = root.querySelector('main > div, .main-content > main > div');
      if (main && main !== lastPage) {
        lastPage = main;
        main.style.animation = 'none';
        main.offsetHeight; // reflow
        main.style.animation = 'pageEnter .45s cubic-bezier(.16,1,.3,1) both';
      }
    });
    mo.observe(root, { childList: true, subtree: true });
  }

  /* ── 9. Stagger Animate Tool Cards ───────────────────*/
  function staggerCards() {
    const animateGroup = (cards) => {
      cards.forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(24px)';
        setTimeout(() => {
          card.style.transition = 'opacity .5s ease, transform .5s cubic-bezier(.16,1,.3,1)';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        }, i * 80 + 100);
      });
    };

    const mo = new MutationObserver(() => {
      requestAnimationFrame(() => {
        const grids = document.querySelectorAll('[data-grid],[style*="grid"]');
        grids.forEach(grid => {
          const cards = [...grid.querySelectorAll('.card:not([data-animated])')];
          if (cards.length > 1) {
            cards.forEach(c => c.dataset.animated = '1');
            animateGroup(cards);
          }
        });
      });
    });
    const root = document.getElementById('root');
    if (root) mo.observe(root, { childList: true, subtree: false });
  }

  /* ── INIT ALL ─────────────────────────────────────────*/
  document.addEventListener('DOMContentLoaded', () => {
    runSplash();
    addRippleToButtons();
    initScrollReveal();
    animateCounters();
    addHeroParticles();
    initCursorGlow();
    initPageTransitions();
    staggerCards();
    setTimeout(animateLogo, 800);
  });

})();
</script>
